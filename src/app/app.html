<h1>Tecnologias Web - Angular</h1>

<div class="container">
    <button type="button" class="btn btn-secondary"> Base clas</button>

<h3>Registro de usuarios</h3>

<form>
  <div class="mb-3">
    <label class="form-label" for="nombre"> Nombre: </label>
    <input class="form-control"  [(ngModel)]="usuario.nombre" type="text" name="nombre">

  </div>
  <div class="mb-3">
    <label class="form-label" for="correo" > Correo: </label>
    <input class="form-control"  [(ngModel)]="usuario.correo" type="email" name="correo">

  </div>
  <div class="mb-3">
    <label class="form-label" for="edad"> Edad: </label>
    <input class="form-control" [(ngModel)]="usuario.edad" type="number" name="edad">

  </div>
  <button class="btn btn-success" (click)="registrar()" > Registrar</button>
  <button class="btn btn-info" [disabled]="!usuario.nombre || !usuario.correo "> Limpiar</button>


</form>

<div class="text-bg-warning p-3 col-10 " >{{mensaje}}</div>
